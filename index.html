<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resmi Destek Merkezi</title>
    <style>
        /* Genel Font ve Netlik Ayarları */
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: #f0f2f5; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        .panel { 
            width: 100%; 
            max-width: 420px; 
            background: white; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
            border-radius: 20px; 
            overflow: hidden; 
        }

        /* Dil Seçici Alanı */
        .lang-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-bottom: 1px solid #ddd;
        }
        .lang-btn {
            cursor: pointer;
            font-size: 24px;
            transition: transform 0.2s;
            filter: grayscale(0.5);
        }
        .lang-btn.active {
            transform: scale(1.3);
            filter: grayscale(0);
        }

        /* Header */
        .header { 
            background: linear-gradient(135deg, #1a3a5a 0%, #2c527a 100%); 
            color: white; 
            text-align: center; 
            padding: 30px 15px; 
            border-bottom: 4px solid #f39c12; 
        }
        .header h1 { margin: 0; font-size: 26px; font-weight: 900; letter-spacing: 1px; }
        .header p { margin: 8px 0 0; font-size: 14px; letter-spacing: 4px; font-weight: 900; opacity: 1; }

        .container { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            padding: 20px; 
            flex-grow: 1; 
        }

        /* Kartlar */
        .card { 
            border-radius: 25px; 
            padding: 15px; 
            text-align: center; 
            color: white; 
            min-height: 180px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* SÜPER ADMİN İÇİN TAM GENİŞLİK */
        .card.super { 
            grid-column: 1 / span 2; 
            background: #b51a66;
        }

        .card h2 { 
            font-size: 16px; 
            margin: 0 0 10px 0; 
            border-bottom: 2px solid rgba(255,255,255,0.5); 
            padding-bottom: 5px; 
            width: 90%; 
            font-weight: 900; 
        }
        .card p { 
            font-size: 12px; 
            margin: 0 0 10px 0; 
            line-height: 1.3; 
            font-weight: 700; 
        }
        .info { 
            font-size: 12px; 
            font-weight: 900; 
            background: rgba(0,0,0,0.2); 
            padding: 6px 12px; 
            border-radius: 12px; 
        }

        /* Renkler */
        .acm { background: #f39c12; }
        .etkinlik { background: #e74c3c; }

        /* Footer ve Patlama Efekti */
        .footer { padding: 20px; background-color: white; margin-top: auto; }
        .alert-box {
            background: #e61a2e;
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 3px solid #ff4d6d;
            box-shadow: 0 0 20px rgba(230, 26, 46, 0.5);
            animation: pulse-explosion 0.6s infinite alternate;
        }
        .alert-box h3 { margin: 0 0 8px 0; font-size: 18px; font-weight: 900; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .alert-box b { display: block; font-size: 14px; font-weight: 900; margin-bottom: 5px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        .alert-box p { font-size: 12px; font-weight: 800; margin: 0; }

        .emoji-3d { display: inline-block; animation: rotate 2s linear infinite; }
        @keyframes rotate { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
        @keyframes pulse-explosion {
            0% { transform: scale(0.95); box-shadow: 0 0 10px rgba(230, 26, 46, 0.6); }
            100% { transform: scale(1.02); box-shadow: 0 0 30px rgba(230, 26, 46, 0.9), 0 0 10px white; }
        }
    </style>
</head>
<body>

    <div class="panel">
        <div class="lang-selector">
            <span class="lang-btn active" onclick="setLanguage('tr', event)" title="Türkçe">🇹🇷</span>
            <span class="lang-btn" onclick="setLanguage('az', event)" title="Azərbaycan">🇦🇿</span>
        </div>

        <div class="header">
            <h1 id="main-title">RESMİ DESTEK MERKEZİ</h1>
            <p>OFFICIAL</p>
        </div>

        <div class="container" id="admin-container">
            </div>

        <div class="footer">
            <div class="alert-box">
                <h3 id="alert-title"><span class="emoji-3d">🚨</span> ÖNEMLİ <span class="emoji-3d">🚨</span></h3>
                <b id="alert-bold">DİKKAT: KANITINIZ OLMAYAN ŞİKAYETLER DEĞERLENDİRMEYE ALINMAZ.</b>
                <p id="alert-p">(Ekran görüntüsü veya video kaydı zorunludur.)</p>
            </div>
        </div>
    </div>

    <script>
        const content = {
            tr: {
                title: "RESMİ DESTEK MERKEZİ",
                alert_h: "ÖNEMLİ",
                alert_b: "DİKKAT: KANITINIZ OLMAYAN ŞİKAYETLER DEĞERLENDİRMEYE ALINMAZ.",
                alert_p: "(Ekran görüntüsü veya video kaydı zorunludur.)",
                admins: [
                    { class: "super", h: "SÜPER ADMİN", p: "Uygulama yönetimi ve genel denetim.", info: "(ID: TR01) MİRAÇ BEY" },
                    { class: "acm", h: "ACM ADMİN", p: "Uygulamanın huzuru, susturma ve yasaklama.", info: "(ID: TR72) AZADİ BEY" },
                    { class: "etkinlik", h: "ETKİNLİK ADMİNİ", p: "ETKİNLİK VE ÖDÜLLER İÇİN REKLAM TALEPLERİ", info: "(ID: TR02) İNCİ HANIM" }
                ]
            },
            az: {
                title: "RƏSMİ DƏSTƏK MƏRKƏZİ",
                alert_h: "VACİB",
                alert_b: "DİQQƏT: SÜBUTUNUZ OLMAYAN ŞİKAYƏTLƏRƏ BAXILMIR.",
                alert_p: "(Ekran görüntüsü və ya video qeydi mütləqdir.)",
                admins: [
                    { class: "super", h: "SÜPER ADMİN", p: "Tətbiq idarəetməsi və ümumi nəzarət.", info: "(ID: AZ01) MİRAÇ BƏY" }
                ]
            }
        };

        function setLanguage(lang, event) {
            // Dil butonlarının aktiflik durumunu güncelle
            const buttons = document.querySelectorAll('.lang-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            // Eğer bir click event'inden geliyorsa o butonu, gelmiyorsa (ilk yükleme) Türkçe butonunu aktif yap
            if (event && event.target) {
                event.target.classList.add('active');
            } else {
                buttons[0].classList.add('active');
            }

            document.getElementById('main-title').innerText = content[lang].title;
            document.getElementById('alert-title').innerHTML = `<span class="emoji-3d">🚨</span> ${content[lang].alert_h} <span class="emoji-3d">🚨</span>`;
            document.getElementById('alert-bold').innerText = content[lang].alert_b;
            document.getElementById('alert-p').innerText = content[lang].alert_p;

            const container = document.getElementById('admin-container');
            container.innerHTML = '';
            
            content[lang].admins.forEach(adm => {
                container.innerHTML += `
                    <div class="card ${adm.class}">
                        <h2>${adm.h}</h2>
                        <p>${adm.p}</p>
                        <div class="info">${adm.info}</div>
                    </div>
                `;
            });
        }

        // Sayfa ilk açıldığında Türkçe başlasın
        window.onload = () => setLanguage('tr');
    </script>
</body>
</html>
